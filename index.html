<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>英語フレーズ リピーター</title>
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --accent: #378ADD;
    --accent-dark: #185FA5;
    --bg: #f5f5f3;
    --card: #ffffff;
    --border: #e2e0da;
    --text: #222220;
    --text-muted: #83817a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .wrap {
    max-width: 480px; margin: 0 auto; padding: 16px; width: 100%;
    flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden;
  }
  #scrollArea { flex: 1; min-height: 0; overflow-y: auto; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px 16px; gap: 8px; }
  .back { background: none; border: none; font-size: 20px; padding: 4px 8px; cursor: pointer; color: var(--text); }
  h1 { font-size: 17px; font-weight: 600; margin: 0; flex: 1; }
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn:active { background: var(--accent-dark); }
  .btn.ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn.ghost:active { background: var(--bg); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  #fileInput { display: none; }
  .empty { text-align: center; color: var(--text-muted); font-size: 14px; padding: 60px 20px; line-height: 1.7; }
  .row-actions { display: flex; gap: 8px; margin-bottom: 12px; }
  .row-actions .btn { flex: 1; }
  .row-actions .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #list { display: flex; flex-direction: column; gap: 8px; }
  .card {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 12px; cursor: pointer;
  }
  .card.active { border-color: var(--accent); background: #eaf2fb; }
  .card .num {
    width: 26px; height: 26px; border-radius: 50%; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text-muted); flex-shrink: 0;
  }
  .card .main { flex: 1; min-width: 0; }
  .card .name { font-size: 14px; word-break: break-word; }
  .card.active .name { color: var(--accent-dark); font-weight: 600; }
  .card .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .card .jp-text { font-size: 12px; color: var(--accent-dark); background: #eaf2fb; padding: 2px 6px; border-radius: 6px; margin-top: 4px; display: inline-block; }
  .card .icon-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; padding: 10px; cursor: pointer; line-height: 1; flex-shrink: 0; min-width: 40px; min-height: 40px; }
  .card .reorder { display: flex; flex-direction: column; gap: 4px; }
  .card .reorder button {
    font-size: 14px; padding: 8px; min-width: 40px; min-height: 34px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text);
  }
  .card .reorder button:disabled { opacity: 0.3; }

  #modalOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 20;
  }
  #modalOverlay.show { display: flex; }
  .modal {
    background: var(--card); border-radius: 14px; padding: 20px; max-width: 360px; width: 100%;
  }
  .modal h2 { font-size: 15px; margin: 0 0 12px; font-weight: 600; }
  .modal p.hint { font-size: 12px; color: var(--text-muted); margin: -6px 0 12px; line-height: 1.6; }
  .modal select, .modal input[type="text"] {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 16px; margin-bottom: 10px;
  }
  .modal .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
  .modal .modal-actions .btn { flex: 1; }

  #player {
    background: var(--card); border-top: 1px solid var(--border);
    padding: 18px 18px calc(22px + env(safe-area-inset-bottom));
    display: none;
    flex-shrink: 0;
    width: 100%;
  }
  #player.show { display: block; }
  .player-inner { max-width: 480px; margin: 0 auto; }
  .now-text { text-align: center; margin-bottom: 18px; }
  .now-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .now-name { font-size: 21px; font-weight: 600; line-height: 1.45; margin-bottom: 8px; }
  .now-jp { font-size: 15px; color: var(--text-muted); }
  .transport { display: flex; align-items: center; justify-content: center; gap: 22px; margin-bottom: 18px; }
  .transport button {
    width: 48px; height: 48px; border-radius: 50%; border: none;
    background: var(--bg); color: var(--text); font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
  #playPause {
    width: 66px; height: 66px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 23px; cursor: pointer; flex-shrink: 0;
  }
  .controls { display: flex; align-items: center; gap: 10px; }
  #repeatBtn {
    font-size: 14px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); cursor: pointer; white-space: nowrap;
  }
  #repeatBtn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .speed-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
  .speed-wrap span { font-size: 13px; color: var(--text-muted); min-width: 34px; }
  input[type="range"] { flex: 1; }
  footer { text-align: center; font-size: 11px; color: var(--text-muted); padding: 20px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <header id="headerBar">
    <h1 id="titleText">英語フレーズ リピーター</h1>
    <button class="btn" id="addBtn" type="button">＋ ZIPを追加</button>
  </header>
  <input id="fileInput" type="file" accept=".zip,application/zip,application/x-zip-compressed,multipart/x-zip,application/octet-stream" multiple>

  <div id="rowActions" class="row-actions" style="display:none;">
    <button class="btn ghost" id="sequentialBtn" type="button">▶ 連続再生</button>
    <button class="btn ghost" id="shuffleBtn" type="button">🔀 シャッフル再生</button>
  </div>

  <div id="scrollArea">
    <div id="empty" class="empty"></div>
    <div id="list"></div>

    <footer>一度読み込んだ音声は、この端末の中に保存されます。次回からはネット接続がなくても開けます。</footer>
  </div>
</div>

<div id="modalOverlay">
  <div class="modal">
    <h2>追加先のフォルダ</h2>
    <p class="hint">ZIPファイルを入れるフォルダを選んでください。複数まとめて選択できます。</p>
    <select id="folderSelect"></select>
    <input type="text" id="newFolderName" placeholder="フォルダ名を入力">
    <div class="modal-actions">
      <button class="btn ghost" id="modalCancel" type="button">キャンセル</button>
      <button class="btn" id="modalConfirm" type="button">追加</button>
    </div>
  </div>
</div>

<div id="player">
  <div class="player-inner">
    <div class="now-text">
      <div class="now-label" id="nowLabel">再生中</div>
      <div class="now-name" id="nowName">-</div>
      <div class="now-jp" id="nowJp"></div>
    </div>
    <div class="transport">
      <button id="prevBtn" type="button" title="前へ">⏮</button>
      <button id="playPause" type="button">▶</button>
      <button id="nextBtn" type="button" title="次へ">⏭</button>
    </div>
    <div class="controls">
      <button id="repeatBtn" type="button" class="on">🔁 くり返しON</button>
      <div class="speed-wrap">
        <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="1">
        <span id="speedOut">1.0x</span>
      </div>
    </div>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
const DB_NAME = 'englishAudioReplay';
const DB_VERSION = 3;
const SILENCE_MS = 1500;
const SAMPLE_FOLDER_NAME = 'ホテル滞在を快適にする一言';
const SAMPLE_ZIP_FILES = [
  'i_arrived_earlier_than_my_checkin_time_could_you_p.zip',
  'when_i_entered_the_room_it_smelt_of_cigarettes_can.zip',
  'can_i_change_some_money_please.zip',
  'the_air_con_isnt_working_well_so_could_i_change_ro.zip',
  'could_you_book_a_taxi_for_tomorrow_morning_please.zip',
  'it_is_very_noisy_next_door_and_i_cannot_sleep_coul.zip',
  'could_i_have_another_blanket_please.zip',
  'can_i_stay_for_one_more_night.zip',
  'could_you_keep_my_luggage_for_two_hours_after_i_ch.zip',
  'can_we_change_the_breakfast_time_tomorrow_to_7_ocl.zip'
];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (db.objectStoreNames.contains('tracks')) db.deleteObjectStore('tracks');
      if (!db.objectStoreNames.contains('folders')) {
        db.createObjectStore('folders', { keyPath: 'id', autoIncrement: true });
      }
      const trackStore = db.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
      trackStore.createIndex('folderId', 'folderId');
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function addFolder(name) {
  const db = await openDB();
  const tx = db.transaction('folders', 'readwrite');
  const req = tx.objectStore('folders').add({ name, createdAt: Date.now() });
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function renameFolder(id, name) {
  const db = await openDB();
  const tx = db.transaction('folders', 'readwrite');
  const store = tx.objectStore('folders');
  const getReq = store.get(id);
  return new Promise((resolve, reject) => {
    getReq.onsuccess = () => {
      const rec = getReq.result;
      if (!rec) return resolve();
      rec.name = name;
      store.put(rec);
    };
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function getAllFolders() {
  const db = await openDB();
  const tx = db.transaction('folders', 'readonly');
  return new Promise((resolve, reject) => {
    const req = tx.objectStore('folders').getAll();
    req.onsuccess = () => resolve(req.result.sort((a, b) => a.createdAt - b.createdAt));
    req.onerror = () => reject(req.error);
  });
}

async function deleteFolder(id) {
  const db = await openDB();
  const tx = db.transaction(['folders', 'tracks'], 'readwrite');
  tx.objectStore('folders').delete(id);
  const idx = tx.objectStore('tracks').index('folderId');
  const req = idx.getAllKeys(IDBKeyRange.only(id));
  req.onsuccess = () => {
    req.result.forEach((k) => tx.objectStore('tracks').delete(k));
  };
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function addTrack(folderId, entry, sortOrder) {
  const db = await openDB();
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').add({
    folderId,
    name: entry.name,
    englishBlob: entry.englishBlob,
    japaneseBlob: entry.japaneseBlob || null,
    englishText: entry.englishText || null,
    japaneseText: entry.japaneseText || null,
    sortOrder,
    addedAt: Date.now()
  });
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function putTracks(records) {
  const db = await openDB();
  const tx = db.transaction('tracks', 'readwrite');
  const store = tx.objectStore('tracks');
  records.forEach((r) => store.put(r));
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function getTracksForFolder(folderId) {
  const db = await openDB();
  const tx = db.transaction('tracks', 'readonly');
  const idx = tx.objectStore('tracks').index('folderId');
  return new Promise((resolve, reject) => {
    const req = idx.getAll(IDBKeyRange.only(folderId));
    req.onsuccess = () => resolve(req.result.sort((a, b) => a.sortOrder - b.sortOrder || a.addedAt - b.addedAt));
    req.onerror = () => reject(req.error);
  });
}

async function deleteTrack(id) {
  const db = await openDB();
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').delete(id);
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

function displayName(name) {
  return name.replace(/[_-]+/g, ' ').trim();
}

function isAudioExt(name) {
  return /\.(mp3|wav|m4a|ogg|aac)$/i.test(name);
}

function baseName(name) {
  return name.replace(/\.[^/.]+$/, '');
}

// ---- ZIP import ----
async function processZipFile(file) {
  let zip;
  try {
    zip = await JSZip.loadAsync(file);
  } catch (e) {
    return null;
  }
  const entries = Object.values(zip.files).filter((f) => !f.dir);
  let englishEntry = null, japaneseEntry = null, textEntry = null;
  for (const e of entries) {
    const name = e.name.split('/').pop();
    if (/\.txt$/i.test(name)) { textEntry = e; }
    else if (isAudioExt(name)) {
      if (/_ja\.[a-z0-9]+$/i.test(name)) japaneseEntry = e;
      else englishEntry = e;
    }
  }
  if (!englishEntry) return null;

  const englishBlob = new Blob([await englishEntry.async('blob')], { type: 'audio/mpeg' });
  const japaneseBlob = japaneseEntry ? new Blob([await japaneseEntry.async('blob')], { type: 'audio/mpeg' }) : null;
  let englishText = null, japaneseText = null;
  if (textEntry) {
    const txt = await textEntry.async('string');
    const lines = txt.split(/\r?\n/);
    englishText = (lines[0] || '').trim() || null;
    japaneseText = (lines[1] || '').trim() || null;
  }
  const name = baseName(englishEntry.name.split('/').pop());
  return { name, englishBlob, japaneseBlob, englishText, japaneseText };
}

function uniqueTrackName(existingNames, name) {
  if (!existingNames.has(name)) return name;
  let i = 2;
  while (existingNames.has(name + '_' + i)) i++;
  return name + '_' + i;
}

async function importZipFilesIntoFolder(folderId, files) {
  const existing = await getTracksForFolder(folderId);
  const existingNames = new Set(existing.map((t) => t.name));
  let nextOrder = existing.length ? Math.max(...existing.map((t) => t.sortOrder)) + 1 : 0;
  let okCount = 0, failCount = 0;
  for (const file of files) {
    const entry = await processZipFile(file);
    if (!entry) { failCount++; continue; }
    entry.name = uniqueTrackName(existingNames, entry.name);
    existingNames.add(entry.name);
    await addTrack(folderId, entry, nextOrder++);
    okCount++;
  }
  return { okCount, failCount };
}

// ---- sample folder (first launch only) ----
async function seedSampleFolderIfNeeded() {
  if (localStorage.getItem('sampleSeeded') === '1') return;
  localStorage.setItem('sampleSeeded', '1');
  const folders = await getAllFolders();
  if (folders.length) return; // user already has content; don't intrude
  try {
    const files = [];
    for (const name of SAMPLE_ZIP_FILES) {
      try {
        const res = await fetch('./sample/' + name);
        if (!res.ok) continue;
        const blob = await res.blob();
        files.push(new File([blob], name));
      } catch (e) { /* skip missing sample file */ }
    }
    if (!files.length) return;
    const folderId = await addFolder(SAMPLE_FOLDER_NAME);
    await importZipFilesIntoFolder(folderId, files);
  } catch (e) {
    console.warn('サンプルフォルダの読み込みに失敗しました', e);
  }
}

// ---- app state ----
let view = 'folders'; // 'folders' | 'folder'
let currentFolder = null;
let folderTracks = [];
let pendingFiles = null;

let activeTrack = null;
let repeatOn = true;
let currentUrl = null;
let currentJaUrl = null;
let queue = null; // { trackIds: [], index: 0 }
let gapTimerId = null;
let pendingGapAction = null;
let isPlaybackPaused = false;
let playingSegment = null; // 'en' | 'ja'

const titleText = document.getElementById('titleText');
const headerBar = document.getElementById('headerBar');
const addBtn = document.getElementById('addBtn');
const rowActions = document.getElementById('rowActions');
const sequentialBtn = document.getElementById('sequentialBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const emptyEl = document.getElementById('empty');
const listEl = document.getElementById('list');
const playerEl = document.getElementById('player');
const nowNameEl = document.getElementById('nowName');
const nowJpEl = document.getElementById('nowJp');
const nowLabelEl = document.getElementById('nowLabel');
const playPauseBtn = document.getElementById('playPause');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const repeatBtn = document.getElementById('repeatBtn');
const speedInput = document.getElementById('speed');
const speedOut = document.getElementById('speedOut');
const audioEl = document.getElementById('audioEl');
const modalOverlay = document.getElementById('modalOverlay');
const folderSelect = document.getElementById('folderSelect');
const newFolderName = document.getElementById('newFolderName');
const modalConfirmBtn = document.getElementById('modalConfirm');
const NEW_FOLDER_VALUE = '__new__';

async function renderFoldersView() {
  view = 'folders';
  titleText.textContent = '英語フレーズ リピーター';
  document.querySelector('.back')?.remove();
  rowActions.style.display = 'none';
  const folders = await getAllFolders();
  if (!folders.length) {
    emptyEl.style.display = 'block';
    emptyEl.innerHTML = 'まだフォルダがありません。<br>「＋ ZIPを追加」から、ダウンロードしたZIPファイルを選んでください。';
    listEl.innerHTML = '';
    return;
  }
  emptyEl.style.display = 'none';
  listEl.innerHTML = '';
  for (const f of folders) {
    const tracks = await getTracksForFolder(f.id);
    const row = document.createElement('div');
    row.className = 'card';
    row.innerHTML =
      '<span class="main">' +
      '<div class="name">📁 ' + f.name + '</div>' +
      '<div class="sub">' + tracks.length + '件</div>' +
      '</span>' +
      '<button class="icon-btn rename" type="button" aria-label="名前を変更">✎</button>' +
      '<button class="icon-btn del" type="button" aria-label="削除">🗑</button>';
    row.addEventListener('click', (e) => {
      if (e.target.closest('.rename') || e.target.closest('.del')) return;
      openFolder(f);
    });
    row.querySelector('.rename').addEventListener('click', async (e) => {
      e.stopPropagation();
      const newName = prompt('新しいフォルダ名を入力してください', f.name);
      if (!newName || !newName.trim()) return;
      await renameFolder(f.id, newName.trim());
      renderFoldersView();
    });
    row.querySelector('.del').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('「' + f.name + '」を削除しますか？中の音声もすべて削除されます。')) return;
      await deleteFolder(f.id);
      renderFoldersView();
    });
    listEl.appendChild(row);
  }
}

async function openFolder(folder) {
  currentFolder = folder;
  view = 'folder';
  titleText.textContent = folder.name;
  if (!document.querySelector('.back')) {
    const back = document.createElement('button');
    back.className = 'back';
    back.type = 'button';
    back.textContent = '←';
    back.addEventListener('click', () => { renderFoldersView(); stopPlayback(); });
    headerBar.insertBefore(back, titleText);
  }
  await renderFolderView();
}

function updateRowActionsHighlight() {
  const mode = queue ? queue.mode : null;
  sequentialBtn.classList.toggle('active', mode === 'sequential');
  shuffleBtn.classList.toggle('active', mode === 'shuffle');
}

async function renderFolderView() {
  folderTracks = await getTracksForFolder(currentFolder.id);
  rowActions.style.display = folderTracks.length ? 'flex' : 'none';
  updateRowActionsHighlight();
  if (!folderTracks.length) {
    emptyEl.style.display = 'block';
    emptyEl.innerHTML = 'このフォルダにはまだ音声がありません。<br>「＋ ZIPを追加」から追加してください。';
    listEl.innerHTML = '';
    return;
  }
  emptyEl.style.display = 'none';
  listEl.innerHTML = '';
  folderTracks.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'card' + (activeTrack && activeTrack.id === t.id ? ' active' : '');
    row.innerHTML =
      '<span class="num">' + (i + 1) + '</span>' +
      '<span class="main">' +
      '<div class="name">' + (t.englishText || displayName(t.name)) + '</div>' +
      (t.japaneseText ? '<span class="jp-text">' + t.japaneseText + '</span>' : '') +
      '</span>' +
      '<span class="reorder">' +
      '<button class="up" type="button" aria-label="上へ"' + (i === 0 ? ' disabled' : '') + '>▲</button>' +
      '<button class="down" type="button" aria-label="下へ"' + (i === folderTracks.length - 1 ? ' disabled' : '') + '>▼</button>' +
      '</span>' +
      '<button class="icon-btn del" type="button" aria-label="削除">🗑</button>';
    row.addEventListener('click', (e) => {
      if (e.target.closest('.up') || e.target.closest('.down') || e.target.closest('.del')) return;
      queue = null;
      startPlayback(t);
    });
    row.querySelector('.up').addEventListener('click', async (e) => {
      e.stopPropagation();
      await moveTrack(i, i - 1);
    });
    row.querySelector('.down').addEventListener('click', async (e) => {
      e.stopPropagation();
      await moveTrack(i, i + 1);
    });
    row.querySelector('.del').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('「' + (t.englishText || displayName(t.name)) + '」を削除しますか？')) return;
      await deleteTrack(t.id);
      if (activeTrack && activeTrack.id === t.id) stopPlayback();
      renderFolderView();
    });
    listEl.appendChild(row);
  });
}

async function moveTrack(fromIndex, toIndex) {
  if (toIndex < 0 || toIndex >= folderTracks.length) return;
  const arr = folderTracks.slice();
  const [moved] = arr.splice(fromIndex, 1);
  arr.splice(toIndex, 0, moved);
  arr.forEach((t, idx) => { t.sortOrder = idx; });
  await putTracks(arr);
  await renderFolderView();
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

sequentialBtn.addEventListener('click', () => {
  queue = { trackIds: folderTracks.map((t) => t.id), index: 0, mode: 'sequential' };
  startPlayback(folderTracks.find((t) => t.id === queue.trackIds[0]));
});

shuffleBtn.addEventListener('click', () => {
  const shuffled = shuffleArray(folderTracks.map((t) => t.id));
  queue = { trackIds: shuffled, index: 0, mode: 'shuffle' };
  startPlayback(folderTracks.find((t) => t.id === queue.trackIds[0]));
});

function clearGapTimer() {
  if (gapTimerId) { clearTimeout(gapTimerId); gapTimerId = null; }
}

function scheduleGap(fn) {
  clearGapTimer();
  pendingGapAction = fn;
  gapTimerId = setTimeout(() => {
    gapTimerId = null;
    pendingGapAction = null;
    fn();
  }, SILENCE_MS);
}

function playSegment(blob, onEnd) {
  if (currentUrl) URL.revokeObjectURL(currentUrl);
  currentUrl = URL.createObjectURL(blob);
  audioEl.src = currentUrl;
  audioEl.playbackRate = parseFloat(speedInput.value);
  audioEl.onended = onEnd;
  audioEl.play().catch((err) => console.warn('再生に失敗しました', err));
  playPauseBtn.textContent = '⏸';
}

function runCycle() {
  playingSegment = 'en';
  nowLabelEl.textContent = queue ? '連続再生中 (' + (queue.index + 1) + '/' + queue.trackIds.length + ')' : '再生中';
  playSegment(activeTrack.englishBlob, () => {
    if (activeTrack.japaneseBlob) {
      scheduleGap(() => {
        playingSegment = 'ja';
        playSegment(activeTrack.japaneseBlob, onCycleComplete);
      });
    } else {
      scheduleGap(onCycleComplete);
    }
  });
  updateMediaSession();
}

function onCycleComplete() {
  playingSegment = null;
  if (queue) {
    scheduleGap(advanceQueue);
  } else if (repeatOn) {
    scheduleGap(runCycle);
  } else {
    playPauseBtn.textContent = '▶';
  }
}

function advanceQueue() {
  queue.index += 1;
  if (queue.index >= queue.trackIds.length) {
    if (!repeatOn) {
      stopPlayback();
      return;
    }
    queue.index = 0;
  }
  const nextId = queue.trackIds[queue.index];
  const next = folderTracks.find((t) => t.id === nextId);
  activeTrack = next;
  nowNameEl.textContent = next.englishText || displayName(next.name);
  nowJpEl.textContent = next.japaneseText || '';
  renderFolderView();
  runCycle();
}

function startPlayback(track) {
  activeTrack = track;
  isPlaybackPaused = false;
  nowNameEl.textContent = track.englishText || displayName(track.name);
  nowJpEl.textContent = track.japaneseText || '';
  playerEl.classList.add('show');
  renderFolderView();
  runCycle();
}

function stopPlayback() {
  clearGapTimer();
  pendingGapAction = null;
  isPlaybackPaused = false;
  audioEl.pause();
  audioEl.removeAttribute('src');
  playerEl.classList.remove('show');
  activeTrack = null;
  queue = null;
  playingSegment = null;
  if (view === 'folder') renderFolderView();
}

function gotoRelative(offset) {
  if (!activeTrack) return;
  clearGapTimer();
  pendingGapAction = null;
  isPlaybackPaused = false;
  if (queue) {
    let idx = queue.index + offset;
    if (idx < 0) {
      if (!repeatOn) return;
      idx = queue.trackIds.length - 1;
    } else if (idx >= queue.trackIds.length) {
      if (!repeatOn) { stopPlayback(); return; }
      idx = 0;
    }
    queue.index = idx;
    const next = folderTracks.find((t) => t.id === queue.trackIds[idx]);
    if (!next) return;
    activeTrack = next;
    nowNameEl.textContent = next.englishText || displayName(next.name);
    nowJpEl.textContent = next.japaneseText || '';
    renderFolderView();
    runCycle();
    return;
  }
  if (!folderTracks.length) return;
  const idx = folderTracks.findIndex((t) => t.id === activeTrack.id);
  if (idx === -1) return;
  const nextIdx = idx + offset;
  if (nextIdx < 0 || nextIdx >= folderTracks.length) return;
  startPlayback(folderTracks[nextIdx]);
}

prevBtn.addEventListener('click', () => gotoRelative(-1));
nextBtn.addEventListener('click', () => gotoRelative(1));

function pausePlayback() {
  if (!activeTrack || isPlaybackPaused) return;
  isPlaybackPaused = true;
  playPauseBtn.textContent = '▶';
  if (gapTimerId) {
    clearGapTimer(); // pendingGapAction stays set, so resumePlayback can continue from here
  } else {
    audioEl.pause();
  }
}

function resumePlayback() {
  if (!activeTrack || !isPlaybackPaused) return;
  isPlaybackPaused = false;
  playPauseBtn.textContent = '⏸';
  if (pendingGapAction) {
    const fn = pendingGapAction;
    pendingGapAction = null;
    fn();
  } else {
    audioEl.play().catch((err) => console.warn('再生に失敗しました', err));
  }
}

playPauseBtn.addEventListener('click', () => {
  if (!activeTrack) return;
  if (isPlaybackPaused) {
    resumePlayback();
  } else {
    pausePlayback();
  }
});

repeatBtn.addEventListener('click', () => {
  repeatOn = !repeatOn;
  repeatBtn.classList.toggle('on', repeatOn);
  repeatBtn.textContent = '🔁 くり返し' + (repeatOn ? 'ON' : 'OFF');
});

speedInput.addEventListener('input', () => {
  const v = parseFloat(speedInput.value);
  audioEl.playbackRate = v;
  speedOut.textContent = v.toFixed(1) + 'x';
});

// ---- Media Session (background / lock screen) ----
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !activeTrack) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: activeTrack.englishText || displayName(activeTrack.name),
    artist: currentFolder ? currentFolder.name : '英語フレーズ リピーター'
  });
}

if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', resumePlayback);
  navigator.mediaSession.setActionHandler('pause', pausePlayback);
  navigator.mediaSession.setActionHandler('previoustrack', () => gotoRelative(-1));
  navigator.mediaSession.setActionHandler('nexttrack', () => gotoRelative(1));
}

// ---- add flow ----
addBtn.addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  if (!files.length) return;
  pendingFiles = files;
  await openFolderModal();
});

function updateModalForSelection() {
  const isNew = folderSelect.value === NEW_FOLDER_VALUE;
  newFolderName.style.display = isNew ? 'block' : 'none';
  modalConfirmBtn.textContent = isNew ? 'フォルダを作って追加' : '追加';
  if (isNew) newFolderName.focus();
}

folderSelect.addEventListener('change', updateModalForSelection);

async function openFolderModal() {
  const folders = await getAllFolders();
  folderSelect.innerHTML =
    folders.map((f) => '<option value="' + f.id + '">📁 ' + f.name + '</option>').join('') +
    '<option value="' + NEW_FOLDER_VALUE + '">＋ 新しいフォルダを作る</option>';
  newFolderName.value = '';
  if (view === 'folder' && currentFolder) {
    folderSelect.value = String(currentFolder.id);
  } else if (!folders.length) {
    folderSelect.value = NEW_FOLDER_VALUE;
  } else {
    folderSelect.value = String(folders[0].id);
  }
  updateModalForSelection();
  modalOverlay.classList.add('show');
}

document.getElementById('modalCancel').addEventListener('click', () => {
  modalOverlay.classList.remove('show');
  pendingFiles = null;
});

modalConfirmBtn.addEventListener('click', async () => {
  let folderId = null;
  if (folderSelect.value === NEW_FOLDER_VALUE) {
    const newName = newFolderName.value.trim();
    if (!newName) {
      alert('新しいフォルダ名を入力してください。');
      return;
    }
    folderId = await addFolder(newName);
  } else {
    folderId = folderSelect.value ? parseInt(folderSelect.value, 10) : null;
    if (!folderId) {
      alert('追加先のフォルダを選んでください。');
      return;
    }
  }
  modalOverlay.classList.remove('show');
  const files = pendingFiles;
  pendingFiles = null;
  const { okCount, failCount } = await importZipFilesIntoFolder(folderId, files);
  if (failCount) {
    alert(okCount + '件を追加しました。' + failCount + '件は読み込めませんでした（ZIPの中身をご確認ください）。');
  }
  if (view === 'folder' && currentFolder && currentFolder.id === folderId) {
    await renderFolderView();
  } else {
    const folders = await getAllFolders();
    const f = folders.find((x) => x.id === folderId);
    if (f) await openFolder(f);
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

(async function init() {
  await seedSampleFolderIfNeeded();
  renderFoldersView();
})();
</script>
